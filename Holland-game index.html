<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>홀랜드 시한폭탄 해체 작전</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Black+Han+Sans&display=swap');

        :root {
            --main-yellow: #FFD700;
            --dark-black: #1A1A1A;
            --accent-red: #D32F2F;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--main-yellow);
            color: var(--dark-black);
            overflow: hidden;
            height: 100vh;
            transition: background-color 0.5s ease;
        }

        .font-title {
            font-family: 'Black Han Sans', sans-serif;
        }

        .bomb-shake {
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-radius: 24px;
        }

        .btn-option {
            background: white;
            color: var(--dark-black);
            border: 3px solid var(--dark-black);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 4px 4px 0px var(--dark-black);
        }

        .btn-option:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--dark-black);
            background-color: var(--dark-black);
            color: var(--main-yellow);
        }

        .btn-option:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px var(--dark-black);
        }

        .timer-text {
            font-variant-numeric: tabular-nums;
            letter-spacing: -2px;
        }

        .screen {
            display: none;
        }

        .active {
            display: flex;
        }
    </style>
</head>
<body>

    <!-- 메인 메뉴 -->
    <div id="start-screen" class="screen active flex-col items-center justify-center h-full gap-8 p-4 text-center">
        <div class="relative">
            <h1 class="text-6xl md:text-8xl text-black font-title mb-2">시한폭탄 해체</h1>
            <div class="h-4 bg-black w-full mb-8"></div>
        </div>
        <p class="text-xl md:text-2xl font-bold opacity-80">홀랜드 흥미유형을 맞혀 폭발을 저지하세요!</p>
        <div class="text-9xl mb-4 animate-bounce">💣</div>
        <button onclick="startGame()" class="bg-black text-white text-3xl px-16 py-5 rounded-2xl font-title hover:bg-gray-800 transition-all transform hover:scale-110 shadow-2xl">미션 시작</button>
    </div>

    <!-- 게임 화면 -->
    <div id="game-screen" class="screen flex-col items-center justify-start h-full p-6 pt-12">
        <!-- 상단 정보 바 -->
        <div class="w-full max-w-5xl flex justify-between items-center mb-8 bg-black text-white p-6 rounded-3xl shadow-2xl">
            <div class="flex flex-col">
                <span class="text-xs uppercase opacity-50">Remain</span>
                <span class="text-2xl font-bold">폭탄: <span id="bomb-count" class="text-yellow-400">6</span></span>
            </div>
            <div id="timer" class="text-5xl md:text-7xl font-title text-red-500 timer-text">00:12</div>
            <div class="flex flex-col items-end">
                <span class="text-xs uppercase opacity-50">Score</span>
                <span id="score" class="text-2xl font-bold text-green-400">0</span>
            </div>
        </div>

        <!-- 가로형 문제 구역 -->
        <div class="w-full max-w-5xl bg-white rounded-3xl p-8 border-4 border-black flex flex-col md:flex-row items-center gap-8 mb-10 shadow-[12px_12px_0px_rgba(0,0,0,1)]">
            <div id="bomb-container" class="bomb-shake flex-shrink-0">
                <i class="fa-solid fa-bomb text-8xl md:text-9xl text-black"></i>
            </div>
            <div class="w-full min-h-[150px] flex items-center justify-center md:justify-start">
                <div id="question" class="text-2xl md:text-3xl lg:text-4xl text-black font-bold leading-tight">
                    준비되셨나요?
                </div>
            </div>
        </div>

        <!-- 선택지 -->
        <div id="options" class="grid grid-cols-2 md:grid-cols-3 gap-6 w-full max-w-5xl mb-8">
            <!-- 버튼들이 동적으로 생성됩니다 -->
        </div>
    </div>

    <!-- 결과 화면 -->
    <div id="result-screen" class="screen flex-col items-center justify-center h-full gap-8 text-center p-4">
        <div id="result-icon" class="text-9xl">🏆</div>
        <h2 id="result-title" class="text-7xl md:text-9xl font-title">MISSION CLEAR</h2>
        <p id="result-msg" class="text-2xl md:text-3xl font-bold">당신은 홀랜드 전문가입니다!</p>
        <div class="bg-black text-white px-10 py-4 rounded-2xl">
            <p class="text-4xl font-bold">SCORE: <span id="final-score" class="text-yellow-400">0</span></p>
        </div>
        <button onclick="location.reload()" class="bg-black text-white text-2xl px-12 py-4 rounded-xl font-bold hover:bg-gray-800 transform hover:scale-105 transition-all">다시 도전하기</button>
    </div>

    <script>
        const hollandData = [
            {
                type: "실재형 (R)",
                desc: "사물, 기계, 도구, 동식물을 다루는 활동에 관심을 둡니다. 구체적이고 체계적이며 몸으로 부딪혀 문제를 해결하는 성향을 보입니다.",
                jobs: "자동차 정비사, 엔지니어, 항공기 조종사, 운동선수, 농부, 동물조련사"
            },
            {
                type: "탐구형 (I)",
                desc: "수학적, 물리적, 생물학적 현상을 관찰하고 배우고 연구하기를 좋아합니다. 논리적이고 호기심이 많으며 신중합니다.",
                jobs: "과학자, 의사, 화학자, 지질학자, 인류학자, 의료기술자"
            },
            {
                type: "예술형 (A)",
                desc: "자유롭고 비구조적인 환경에서 활동하고 싶어하며 새로운 것을 창작하는 활동에 몰두합니다. 감수성이 풍부하고 개성이 뚜렷합니다.",
                jobs: "예술가, 작곡가, 음악가, 무대감독, 작가, 배우, 디자이너, 영화감독"
            },
            {
                type: "사회형 (S)",
                desc: "다른 사람을 가르치거나 돌보거나 치유하고 돕는 일을 좋아합니다. 따뜻하고 인정이 많으며 타인의 감정을 잘 이해합니다.",
                jobs: "사회복지사, 간호사, 유치원 교사, 상담가, 교육자, 종교지도자"
            },
            {
                type: "기업형 (E)",
                desc: "조직적인 목표나 경제적인 이득을 얻는 활동을 좋아합니다. 타인을 이끌거나 설득하는 리더 역할을 하며 모험심이 강합니다.",
                jobs: "기업경영인, 정치가, 판사, 외교관, 보험회사원, 영업사원, 국회의원"
            },
            {
                type: "관습형 (C)",
                desc: "수를 다루거나 자료를 정리하는 체계적이고 조직적인 일을 좋아합니다. 정확한 절차를 따르고 꼼꼼하며 약속을 잘 지킵니다.",
                jobs: "공인회계사, 은행원, 사서, 세무사, 일반 공무원, 경리사원, 감사원"
            }
        ];

        let currentLevel = 0;
        let score = 0;
        let timeLeft = 12;
        let timerInterval;
        let audioCtx;

        function playTone(freq, type, duration) {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playCorrect() {
            playTone(660, 'sine', 0.1); 
            setTimeout(() => playTone(880, 'sine', 0.2), 100); 
        }

        function playWrong() {
            playTone(100, 'sawtooth', 0.5);
        }

        function playTick() {
            playTone(1200, 'sine', 0.02);
        }

        function startGame() {
            document.getElementById('start-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            currentLevel = 0;
            score = 0;
            updateBombCount();
            nextQuestion();
        }

        function updateBombCount() {
            document.getElementById('bomb-count').innerText = hollandData.length - currentLevel;
        }

        function startTimer() {
            timeLeft = 12;
            clearInterval(timerInterval);
            updateTimerDisplay();
            
            timerInterval = setInterval(() => {
                timeLeft--;
                if(timeLeft <= 5) {
                    playTick();
                    document.getElementById('timer').classList.add('animate-pulse');
                } else {
                    document.getElementById('timer').classList.remove('animate-pulse');
                }
                updateTimerDisplay();
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    gameOver(false);
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            document.getElementById('timer').innerText = `00:${timeLeft < 10 ? '0'+timeLeft : timeLeft}`;
        }

        function nextQuestion() {
            if (currentLevel >= hollandData.length) {
                gameOver(true);
                return;
            }

            const data = hollandData[currentLevel];
            const isJobQuestion = Math.random() > 0.5;
            
            const qElement = document.getElementById('question');
            if (isJobQuestion) {
                qElement.innerHTML = `<span class="bg-black text-white px-2 py-1 text-base uppercase mr-2 rounded">JOBS</span><br>${data.jobs}`;
            } else {
                qElement.innerHTML = `<span class="bg-red-600 text-white px-2 py-1 text-base uppercase mr-2 rounded">INFO</span><br>${data.desc}`;
            }

            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';

            const allTypes = hollandData.map(d => d.type);
            allTypes.sort(() => Math.random() - 0.5);

            allTypes.forEach(type => {
                const btn = document.createElement('button');
                btn.className = "btn-option p-6 rounded-2xl text-xl font-black";
                btn.innerText = type;
                btn.onclick = () => checkAnswer(type);
                optionsContainer.appendChild(btn);
            });

            startTimer();
        }

        function checkAnswer(selected) {
            const correct = hollandData[currentLevel].type;
            if (selected === correct) {
                playCorrect();
                score += (timeLeft * 25);
                document.getElementById('score').innerText = score;
                currentLevel++;
                updateBombCount();
                nextQuestion();
            } else {
                playWrong();
                gameOver(false);
            }
        }

        function gameOver(isWin) {
            clearInterval(timerInterval);
            document.getElementById('game-screen').classList.remove('active');
            document.getElementById('result-screen').classList.add('active');

            const title = document.getElementById('result-title');
            const icon = document.getElementById('result-icon');
            const msg = document.getElementById('result-msg');
            const finalScore = document.getElementById('final-score');

            finalScore.innerText = score;

            if (isWin) {
                document.body.style.backgroundColor = "#4CAF50";
                title.innerText = "MISSION CLEAR";
                title.style.color = "white";
                icon.innerText = "⚡";
                msg.innerText = "모든 폭탄을 무사히 해체했습니다!";
            } else {
                document.body.style.backgroundColor = "#FF5252";
                title.innerText = "BOOOOOM!!!";
                title.style.color = "black";
                icon.innerText = "💥";
                msg.innerText = "폭탄이 폭발했습니다. 다시 시도해 보세요!";
            }
        }
    </script>
</body>
</html>
