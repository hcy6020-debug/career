<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>중학생 다중지능 탐구 퀴즈</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f0f4f8; }
        .quiz-card { transition: all 0.3s ease; }
        .option-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="app" class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
        <!-- Header -->
        <div class="bg-indigo-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">🧠 다중지능 탐구 퀴즈</h1>
            <p class="text-indigo-100 mt-2">나의 강점 지능과 관련 직업을 알아봐요!</p>
        </div>

        <!-- Progress Bar -->
        <div class="w-full bg-gray-200 h-2">
            <div id="progress" class="bg-indigo-400 h-2 transition-all duration-500" style="width: 0%"></div>
        </div>

        <!-- Quiz Content -->
        <div id="quiz-container" class="p-8">
            <div id="question-area">
                <span id="q-number" class="inline-block px-3 py-1 bg-indigo-100 text-indigo-700 rounded-full text-sm font-bold mb-4">문제 1/7</span>
                <h2 id="question-text" class="text-xl font-bold text-gray-800 mb-6 leading-relaxed">
                    문제가 로딩 중입니다...
                </h2>
                <div id="options" class="space-y-3">
                    <!-- Options will be injected here -->
                </div>
            </div>

            <!-- Feedback Area (Hidden by default) -->
            <div id="feedback" class="hidden mt-8 p-4 rounded-xl border-2">
                <p id="result-msg" class="font-bold text-lg mb-2"></p>
                <p id="rationale-text" class="text-gray-600"></p>
                <button onclick="nextQuestion()" class="mt-4 w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition">
                    다음 문제로 이동
                </button>
            </div>
        </div>

        <!-- Result Screen (Hidden by default) -->
        <div id="result-screen" class="hidden p-8 text-center">
            <div class="mb-6 text-6xl">🎉</div>
            <h2 class="text-3xl font-bold text-gray-800 mb-2">퀴즈 완료!</h2>
            <p id="final-score" class="text-xl text-gray-600 mb-8"></p>
            <button onclick="location.reload()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-indigo-700 transition shadow-lg">
                다시 도전하기
            </button>
        </div>
    </div>

    <script>
        const quizData = [
            {
                question: "언어지능이 높은 학생이 평소 공부할 때 활용하면 가장 효과적인 방법은 무엇인가요?",
                options: [
                    "배운 내용을 자신만의 말로 바꾸어 자세히 정리하기",
                    "공부할 내용의 목차와 점검표를 만들어 순서대로 체크하기",
                    "마인드맵이나 표를 그려서 내용을 시각적으로 배열하기",
                    "공부 중간에 몸을 움직이거나 스트레칭 시간을 갖기"
                ],
                answer: 0,
                rationale: "언어지능이 높은 경우 정보를 언어적으로 재구성하여 표현할 때 이해도가 높아집니다."
            },
            {
                question: "논리수학지능의 특징 중 하나인 '분석적 문제 접근'과 관련이 깊은 활동은 무엇인가요?",
                options: [
                    "새로운 외국어 단어를 리듬에 맞춰 암기한다.",
                    "틀린 문제의 이유를 생각하고 개선할 방법을 단계별로 나눈다.",
                    "동식물의 습성을 관찰하고 일정한 규칙을 찾아 기록한다.",
                    "상대방의 표정이나 몸짓을 보고 기분을 파악한다."
                ],
                answer: 1,
                rationale: "논리적인 인과관계를 따지고 과정을 단계별로 세분화하는 것이 논리수학지능의 핵심입니다."
            },
            {
                question: "다음 중 공간지능이 높은 학생에게 추천할 만한 직업으로만 묶인 것은?",
                options: [
                    "항공기 파일럿, 큐레이터, 무대 디자이너",
                    "회계 감사원, 법조인, 소프트웨어 개발자",
                    "음악 치료사, 라디오 DJ, 음향 기술자",
                    "상담 전문가, 이벤트 사업가, 외교관"
                ],
                answer: 0,
                rationale: "이 직업들은 공간 지각력, 시각적 배치 능력, 3차원적 이해가 필수적입니다."
            },
            {
                question: "신체운동지능이 높은 학생이 교과 내용을 더 잘 이해하기 위해 할 수 있는 활동은?",
                options: [
                    "자신을 전문가라고 가정하고 혼자서 깊이 연구하기",
                    "교과서 내용을 대본으로 만들어 직접 연극하며 익히기",
                    "내용의 관계를 동물이나 식물의 특징에 비유해보기",
                    "중요한 개념들을 리듬이나 노래 가사로 바꿔 부르기"
                ],
                answer: 1,
                rationale: "몸을 직접 움직이고 역할을 수행하는 신체적 경험은 신체운동지능 학습에 큰 도움이 됩니다."
            },
            {
                question: "인간친화지능의 특징인 '중개인이나 카운슬러 역할'을 잘 수행하기 위해 필요한 능력은?",
                options: [
                    "자신의 감정 상태를 일기에 아주 상세히 기록하는 능력",
                    "복잡한 사물의 작동 원리를 파악하고 수리하는 능력",
                    "타인의 감정에 공감하고 집단 내 합의를 이끌어내는 능력",
                    "주변 환경의 소리를 민감하게 구별하고 기억하는 능력"
                ],
                answer: 2,
                rationale: "타인의 기분을 이해하고 갈등을 조율하는 소통 능력은 인간친화지능의 핵심입니다."
            },
            {
                question: "자기성찰지능이 높은 학생들의 일반적인 특징으로 옳은 것은 무엇인가요?",
                options: [
                    "친구들에게 인기가 많고 리더십을 자주 발휘한다.",
                    "자신의 강점과 약점을 명확히 알고 스스로 목표를 세운다.",
                    "말장난이나 시 낭송을 통해 사람들을 즐겁게 한다.",
                    "인공적인 도시 환경보다 숲이나 공원을 훨씬 좋아한다."
                ],
                answer: 1,
                rationale: "자기 자신을 객관적으로 이해하고 스스로를 조절하는 능력이 자기성찰지능의 본질입니다."
            },
            {
                question: "자연친화지능을 기르기 위한 학습 방법 중 '오감을 활용한 관찰'에 해당하는 예시는?",
                options: [
                    "과장된 그림이나 특이한 낙서를 그리며 공부하기",
                    "배운 내용이 우리 주변의 자연 세계와 어떻게 어울리는지 생각하기",
                    "다른 사람이 설명할 때 끝까지 경청하고 질문하기",
                    "수학 공식을 암기하기 위해 약어를 만들어 반복하기"
                ],
                answer: 1,
                rationale: "학습 내용을 자연 현상과 연결 짓는 것은 자연친화지능을 높이는 훌륭한 방법입니다."
            }
        ];

        let currentIdx = 0;
        let score = 0;
        let answered = false;

        function loadQuestion() {
            answered = false;
            const q = quizData[currentIdx];
            document.getElementById('q-number').innerText = `문제 ${currentIdx + 1}/${quizData.length}`;
            document.getElementById('question-text').innerText = q.question;
            document.getElementById('progress').style.width = `${(currentIdx / quizData.length) * 100}%`;
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left p-4 rounded-xl border-2 border-gray-100 bg-gray-50 hover:border-indigo-300 hover:bg-indigo-50 transition-all text-gray-700 font-medium";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(i);
                optionsDiv.appendChild(btn);
            });

            document.getElementById('feedback').classList.add('hidden');
            document.getElementById('question-area').classList.remove('hidden');
        }

        function checkAnswer(selectedIdx) {
            if (answered) return;
            answered = true;
            
            const q = quizData[currentIdx];
            const feedback = document.getElementById('feedback');
            const resultMsg = document.getElementById('result-msg');
            const rationaleText = document.getElementById('rationale-text');
            
            if (selectedIdx === q.answer) {
                score++;
                resultMsg.innerText = "✅ 정답입니다!";
                resultMsg.className = "font-bold text-lg mb-2 text-green-600";
                feedback.className = "mt-8 p-4 rounded-xl border-2 border-green-200 bg-green-50";
            } else {
                resultMsg.innerText = "❌ 아쉬워요, 오답입니다.";
                resultMsg.className = "font-bold text-lg mb-2 text-red-600";
                feedback.className = "mt-8 p-4 rounded-xl border-2 border-red-200 bg-red-50";
            }
            
            rationaleText.innerText = q.rationale;
            feedback.classList.remove('hidden');
            
            // Disable buttons
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach((btn, i) => {
                btn.classList.add('cursor-not-allowed');
                if (i === q.answer) btn.classList.add('border-green-500', 'bg-green-100');
                if (i === selectedIdx && i !== q.answer) btn.classList.add('border-red-500', 'bg-red-100');
            });
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < quizData.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('progress').style.width = "100%";
            document.getElementById('question-area').classList.add('hidden');
            document.getElementById('feedback').classList.add('hidden');
            const resultScreen = document.getElementById('result-screen');
            resultScreen.classList.remove('hidden');
            document.getElementById('final-score').innerText = `${quizData.length}문제 중 ${score}문제를 맞혔습니다!`;
        }

        // Init
        window.onload = loadQuestion;
    </script>
</body>
</html>
